apiVersion: apps/v1
kind: Deployment
metadata:
 name: nginx-with-config
spec:
 replicas: 2
 selector:
  matchLabels:
   app: nginx-config
 template:
  metadata:
   labels:
    app: nginx-config
  spec:
   containers:
   - name: nginx
     image: nginx
     ports:
     - containerPort: 80
     envFrom:
     - configMapRef:
        name: nginx-config
